# kepler-lite/nginx.conf

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unmatched routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Martin tile server (replaces Vite's /martin proxy)
    location /martin/ {
        proxy_pass         http://martin:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Proxy upload API (replaces hard-coded localhost:8787 in api.ts)
    location /api/ {
        proxy_pass         http://upload-service:8787/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        client_max_body_size 200M;
    }
}
