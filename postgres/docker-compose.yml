services:
  db:
    image: postgis/postgis:16-3.4
    container_name: kepler-postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kepler
    ports:
      - "15432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kepler"]
      interval: 5s
      timeout: 5s
      retries: 10

  martin:
    image: ghcr.io/maplibre/martin:v0.13.0
    container_name: kepler-martin
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/kepler
      RUST_LOG: info
    ports:
      - "3000:3000"
    volumes:
      - ./martin.yaml:/config.yaml    
    command: ["--config", "/config.yaml"]

volumes:
  pg_data: