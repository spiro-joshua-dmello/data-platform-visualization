# Martin tile server config
# Mount this as /config.yaml inside the martin container

postgres:
  connection_string: postgres://postgres:postgres@db:5432/kepler

tables:
  points:
    schema: public
    table: points
    srid: 4326
    geometry_column: geom
    id_column: id
    minzoom: 0
    maxzoom: 24
    buffer: 64
    extent: 4096
    clip_geom: false
    geometry_type: POINT
    simplify_until: 0   # ADD THIS — disable simplification
    properties:
      dataset_id: text

  lines:
    schema: public
    table: lines
    srid: 4326
    geometry_column: geom
    id_column: id
    minzoom: 0
    maxzoom: 24
    buffer: 64
    extent: 4096
    clip_geom: false
    geometry_type: LINESTRING
    simplify_until: 0   # ADD THIS — disable simplification
    properties:
      dataset_id: text

  polygons:
    schema: public
    table: polygons
    srid: 4326
    geometry_column: geom
    id_column: id
    minzoom: 0
    maxzoom: 24
    buffer: 256        # increase from 64
    extent: 4096
    clip_geom: false
    geometry_type: MULTIPOLYGON
    simplify_until: 100  # disable simplification entirely
    properties:
      dataset_id: text